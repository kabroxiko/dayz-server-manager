<div class="row">
    <div class="col-12">
        <h1>Online Players</h1>
    </div>
</div>

<div class="row" *ngIf="loading">
    <div class="col-12 text-center">
        <div class="spinner-border" role="status">
            <span class="visually-hidden">Loading...</span>
        </div>
        <p class="mt-2">Loading players...</p>
    </div>
</div>

<div class="row" *ngIf="!loading">
    <div class="col-12">
        <div class="card">
            <div class="card-header d-flex justify-content-between align-items-center">
                <h5 class="card-title mb-0">Player List ({{ players.length }})</h5>
                <button class="btn btn-outline-primary btn-sm" (click)="loadPlayers()">
          Refresh
        </button>
            </div>
            <div class="card-body p-0">
                <div class="table-responsive" *ngIf="players.length > 0">
                    <table class="table table-hover mb-0">
                        <thead class="table-light">
                            <tr>
                                <th>Name</th>
                                <th>IP Address</th>
                                <th>Playtime</th>
                                <th>Ping</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr *ngFor="let player of players">
                                <td class="fw-bold">{{ player.name }}</td>
                                <td>{{ player.ip }}</td>
                                <td>{{ player.playtime }}</td>
                                <td>
                                    <span class="badge" [class.bg-success]="player.ping < 50" [class.bg-warning]="player.ping >= 50 && player.ping < 100" [class.bg-danger]="player.ping >= 100">
                    {{ player.ping }}ms
                  </span>
                                </td>
                                <td>
                                    <span class="badge" [class.bg-success]="player.status === 'online'" [class.bg-secondary]="player.status === 'offline'">
                    {{ player.status }}
                  </span>
                                </td>
                                <td>
                                    <button class="btn btn-outline-danger btn-sm me-2" (click)="kickPlayer(player)" [disabled]="player.status === 'offline'">
                    Kick
                  </button>
                                    <button class="btn btn-outline-warning btn-sm" [disabled]="player.status === 'offline'">
                    Ban
                  </button>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <div class="p-4 text-center text-muted" *ngIf="players.length === 0">
                    <h5>No players online</h5>
                    <p>There are currently no players connected to the server.</p>
                </div>
            </div>
        </div>
    </div>
</div>
