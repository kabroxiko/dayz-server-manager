<div class="container-fluid">
    <div class="row">
        <div class="col-12">
            <h2>Server Configuration</h2>
            <p class="text-muted">
                <span *ngIf="!config">Loading configuration...</span>
                <span *ngIf="config && environment.enableMockMode" class="badge badge-warning">Mock Mode</span>
                <span *ngIf="config && !environment.enableMockMode" class="badge badge-success">Live Configuration</span>
            </p>
        </div>
    </div>

    <div class="row" *ngIf="config">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header">
                    <h5 class="card-title mb-0">Server Configuration Properties</h5>
                </div>
                <div class="card-body">
                    <div class="form-group" *ngFor="let prop of properties; trackBy: trackByProperty">
                        <label [for]="'prop-' + prop.name" class="font-weight-bold">
                            {{ prop.name }}
                            <span *ngIf="prop.custom" class="badge badge-secondary ml-1">Custom</span>
                        </label>
                        <small class="form-text text-muted" *ngIf="prop.description">
                            {{ prop.description }}
                        </small>

                        <!-- Enum dropdown -->
                        <select *ngIf="prop.enum && prop.enum.length > 0" [id]="'prop-' + prop.name" class="form-control" [ngModel]="getServerCfgValue(prop.name)" (ngModelChange)="updateServerCfgProperty(prop.name, $event)">
                            <option *ngFor="let option of prop.enum" [value]="option">{{ option }}</option>
                        </select>

                        <!-- Number input -->
                        <input *ngIf="!prop.enum && prop.type === 'number'" [id]="'prop-' + prop.name" type="number" class="form-control" [ngModel]="getServerCfgValue(prop.name)" (ngModelChange)="updateServerCfgProperty(prop.name, $event)" [placeholder]="prop.default?.toString() || '0'">

                        <!-- Boolean checkbox -->
                        <div *ngIf="!prop.enum && prop.type === 'boolean'" class="form-check">
                            <input [id]="'prop-' + prop.name" type="checkbox" class="form-check-input" [ngModel]="getServerCfgValue(prop.name)" (ngModelChange)="updateServerCfgProperty(prop.name, $event)">
                            <label [for]="'prop-' + prop.name" class="form-check-label">
                                Enable {{ prop.name }}
                            </label>
                        </div>

                        <!-- String input -->
                        <input *ngIf="!prop.enum && prop.type === 'string'" [id]="'prop-' + prop.name" type="text" class="form-control" [ngModel]="getServerCfgValue(prop.name)" (ngModelChange)="updateServerCfgProperty(prop.name, $event)" [placeholder]="prop.default?.toString() || ''">
                    </div>
                </div>
            </div>
        </div>

        <div class="col-md-6">
            <div class="card">
                <div class="card-header">
                    <h5 class="card-title mb-0">Raw Configuration</h5>
                </div>
                <div class="card-body">
                    <div class="form-group">
                        <label for="configEditor">JSON Configuration</label>
                        <textarea id="configEditor" class="form-control" rows="20" [(ngModel)]="configString" placeholder="Configuration will appear here..." style="font-family: monospace; font-size: 12px;"></textarea>
                    </div>
                    <button type="button" class="btn btn-primary" (click)="updateConfig()" [disabled]="!configString">
                        <i class="fas fa-save"></i>
                        {{ environment.enableMockMode ? 'Update Mock Config' : 'Save Configuration' }}
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div class="row mt-4" *ngIf="config && config.discordChannels">
        <div class="col-12">
            <div class="card">
                <div class="card-header">
                    <h5 class="card-title mb-0">Discord Integration</h5>
                </div>
                <div class="card-body">
                    <div class="form-group">
                        <label>Discord Channels</label>
                        <div *ngFor="let channel of config.discordChannels; let i = index" class="row mb-2">
                            <div class="col-md-6">
                                <input type="text" class="form-control" [(ngModel)]="channel.channel" placeholder="Discord Channel ID">
                            </div>
                            <div class="col-md-4">
                                <select class="form-control" [(ngModel)]="channel.mode">
                                    <option *ngFor="let mode of getChannelModes()" [value]="mode">{{ mode }}</option>
                                </select>
                            </div>
                            <div class="col-md-2">
                                <button type="button" class="btn btn-danger btn-sm" (click)="removeDiscordChannel(i)">
                                    <i class="fas fa-trash"></i>
                                </button>
                            </div>
                        </div>
                        <button type="button" class="btn btn-secondary btn-sm" (click)="addDiscordChannel()">
                            <i class="fas fa-plus"></i>
                            Add Channel
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
